project:
  type: website

website:
  title: "Lemnos"
  description: "A personal collection of tools I actually use."

  sidebar:
    style: "docked"
    search: true
    tools:
      - icon: github
        href: https://github.com/evanbio/lemnos
        aria-label: GitHub
    contents:
      - index.qmd
      - section: "Media"
        contents:
          - tools/yt-dlp.qmd
          - tools/ffmpeg.qmd
          - tools/ffsubsync.qmd
          - tools/subtitleedit.qmd
          - tools/imagemagick.qmd
          - tools/pngquant.qmd
          - tools/rembg.qmd
          - tools/geminiwatermarktool.qmd
          - tools/openscreen.qmd
      - section: "Writing"
        contents:
          - tools/typora.qmd
      - section: "AI"
        contents:
          - section: "Commands"
            contents:
              - ai/commands/commit.qmd

  page-footer:
    left: "© 2026 Yibin Zhou"
    right: "Licensed under [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/)"

format:
  html:
    theme:
      light: flatly
      dark: darkly
    css: styles.css
    fontsize: 20px
    mainfont: "Source Serif 4"
    monofont: "JetBrains Mono"
    toc: true
    toc-depth: 3
    toc-location: right
    toc-title: "On this page"
    code-copy: true
    code-overflow: wrap
