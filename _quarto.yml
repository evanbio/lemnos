project:
  type: website

website:
  title: "Lemnos"
  description: "A personal collection of tools I actually use."

  search:
    location: navbar
    type: overlay

  navbar:
    background: primary
    left:
      - text: "Workshop"
        href: index.qmd
    right:
      - icon: github
        href: https://github.com/evanbio/lemnos
        aria-label: GitHub

  sidebar:
    style: "floating"
    collapse-level: 1
    contents:
      - section: "Home"
        contents:
          - index.qmd
      - section: "Media"
        contents:
          - tools/yt-dlp.qmd
          - tools/ffmpeg.qmd

  page-footer:
    left: "© 2026 Yibin Zhou"
    right: "Licensed under [CC BY-NC 4.0](https://creativecommons.org/licenses/by-nc/4.0/)"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    css: styles.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    code-copy: true
    code-overflow: wrap
